# Plugin Manifest — module-detail-export v1.0.0
# Adds an xlsx download button to every tab in the module details dialog
# of v2_modulemanager. No WASM backend needed — all logic runs in the browser.

# ── Identity ──────────────────────────────────────────────────────────────────
id: module-detail-export
name: Module Detail Export
version: 1.0.0
author: VYRA Framework
description: >
  Adds a download button (xlsx icon) to each tab in the v2_modulemanager
  module details view (Info, Functions, Parameters, Volatile, Feeds, Logs).
  Clicking the button exports the currently displayed data as an xlsx file
  using SheetJS (loaded from CDN at runtime).
priority: 60
status: development
load_strategy: eager

# ── Scope ─────────────────────────────────────────────────────────────────────
scope:
  type: MODULE
  target: v2_modulemanager

compatible_with:
  - v2_modulemanager

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  interfaces: []
  network: true        # loads SheetJS from CDN on first use
  storage: none

# ── Entry Points ──────────────────────────────────────────────────────────────
entry_points:
  frontend:
    type: module
    file: plugins/module-detail-export/1.0.0/ui/index.js
    slots:
      - id: module.detail.actions
        component: ModuleDetailExport
        title: Module Detail Export
        priority: 10
        scope:
          type: MODULE
          target: v2_modulemanager

# ── Integrity ─────────────────────────────────────────────────────────────────
checksum: ""
hash: module-detail-export-1.0.0

# ── Documentation ─────────────────────────────────────────────────────────────
docs:
  wiki_path: plugins/module-detail-export/1.0.0/
  search_keywords:
    - export
    - download
    - xlsx
    - module
    - detail

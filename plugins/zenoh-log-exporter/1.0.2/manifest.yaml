# Plugin Manifest — zenoh-log-exporter v1.0.2
# This file defines all metadata for a VYRA plugin.
# See local_repository/plugins/README.md for the full schema documentation.

# ── Identity ──────────────────────────────────────────────────────────────────
id: zenoh-log-exporter      # Unique plugin identifier (kebab-case, no spaces)
name: Zenoh Log Streamer    # Human-readable name shown in the UI
version: 1.0.2              # Semantic version (MAJOR.MINOR.PATCH)
author: DevOps Tools Inc.   # Author or organisation name
description: >
  Enables live log streaming via Zenoh on-demand.
  Provides a sidebar status icon and a full log panel in the app drawer.
priority: 80                # Loading priority (higher = loaded first); range 0–100
status: stable              # development | beta | stable | deprecated
load_strategy: lazy         # eager (load immediately) | lazy (load on first access)

# ── Scope ─────────────────────────────────────────────────────────────────────
scope:
  type: TEMPLATE            # GLOBAL | TEMPLATE | MODULE | INSTANCE
  target: welding_cell      # Template name this plugin is assigned to

# Modules this plugin is compatible with (list of module name_ids)
compatible_with:
  - v2_dashboard
  - gateway_node

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  # List of Zenoh key expression scopes the plugin may subscribe/publish to.
  zenoh_scopes:
    - myproject/logs/**
  network: false            # Whether the plugin may make outbound network calls
  storage: read-only        # none | read-only | read-write

# ── Entry Points ──────────────────────────────────────────────────────────────
entry_points:
  backend:
    type: wasm              # wasm | python
    file: plugins/zenoh-log-exporter/1.0.2/logic.wasm
    handler: init_stream    # WASM function called on plugin initialisation
    runtime_limits:
      memory_mb: 64
      cpu_shares: 0.2
    # No exports defined — this plugin does not expose callable WASM functions.
    exports: []

  frontend:
    type: module
    file: plugins/zenoh-log-exporter/1.0.2/ui/index.js
    css:
      - plugins/zenoh-log-exporter/1.0.2/ui/style.css
    slots:
      - id: sidebar-bottom           # Compact status icon in the sidebar
        component: LogStatusIcon
        title: Log Status
        priority: 10
      - id: app_drawer_right         # Full log panel in the right app drawer
        component: LiveLogPanel
        title: Zenoh Live Logs

# No config_schema — this plugin has no user-configurable options
config_schema: null

# ── Documentation ─────────────────────────────────────────────────────────────
docs:
  wiki_path: plugins/zenoh-log-exporter/1.0.2/docs/readme.md
  search_keywords:
    - logs
    - debug
    - zenoh
    - stream

# ── Integrity ─────────────────────────────────────────────────────────────────
